<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a18;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1030;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7878ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a060ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc2200;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4422;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="rgba(120,120,255,0.08)" stroke-width="1"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="rgba(120,120,255,0.08)" stroke-width="1"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="rgba(120,120,255,0.08)" stroke-width="1"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="rgba(120,120,255,0.08)" stroke-width="1"/>
  <!-- Eye outer shape -->
  <ellipse cx="256" cy="220" rx="160" ry="90" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.6"/>
  <!-- Eye iris - red tint like the image -->
  <circle cx="256" cy="220" r="72" fill="url(#red)" opacity="0.85" filter="url(#glow)"/>
  <!-- Pupil -->
  <circle cx="256" cy="220" r="34" fill="#0a0a18"/>
  <!-- Inner pupil glow -->
  <circle cx="256" cy="220" r="20" fill="rgba(120,120,255,0.3)"/>
  <!-- Chess king crown hint inside pupil -->
  <rect x="249" y="206" width="14" height="18" rx="2" fill="rgba(200,180,255,0.7)"/>
  <rect x="245" y="202" width="22" height="6" rx="2" fill="rgba(200,180,255,0.7)"/>
  <rect x="247" y="196" width="4" height="8" rx="1" fill="rgba(200,180,255,0.7)"/>
  <rect x="253" y="194" width="6" height="10" rx="1" fill="rgba(200,180,255,0.7)"/>
  <rect x="261" y="196" width="4" height="8" rx="1" fill="rgba(200,180,255,0.7)"/>
  <!-- Highlight on iris -->
  <ellipse cx="232" cy="202" rx="16" ry="10" fill="rgba(255,255,255,0.15)"/>
  <!-- Letters S D W at bottom -->
  <text x="256" y="368" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#accent)" text-anchor="middle" letter-spacing="6" filter="url(#glow)">SDW</text>
  <!-- Ops Tracker subtitle -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="28" font-weight="600" fill="rgba(180,160,255,0.75)" text-anchor="middle" letter-spacing="8">OPS</text>
  <!-- Corner dots decoration -->
  <circle cx="60" cy="60" r="5" fill="rgba(120,120,255,0.4)"/>
  <circle cx="452" cy="60" r="5" fill="rgba(120,120,255,0.4)"/>
  <circle cx="60" cy="452" r="5" fill="rgba(120,120,255,0.4)"/>
  <circle cx="452" cy="452" r="5" fill="rgba(120,120,255,0.4)"/>
</svg>